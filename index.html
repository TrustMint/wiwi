<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <!-- PWA & Favicon Configuration -->
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/assets/icon-512.png">
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
    <link rel="manifest" href="/manifest.json" />

    <!-- Meta Tags for PWA behavior -->
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DeMarket">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>DeMarket</title>
    <!-- 
      PRODUCTION RISK: Tailwind CSS is loaded via the Play CDN.
      This version compiles styles in the browser and is not suitable for production due to its size and performance.
      For a production environment, this script should be replaced with a static, compiled, and purged CSS file.
      This requires a build step (e.g., with Vite/PostCSS).
    -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
      body {
        overscroll-behavior-y: none;
      }
      /* Hide scrollbars for all browsers */
      * {
        -ms-overflow-style: none;  /* IE and Edge */
        scrollbar-width: none;  /* Firefox */
      }
      *::-webkit-scrollbar {
        display: none;
      }
      
      /* --- Стили для навигации со свайпом --- */
      .main-content {
        position: relative;
        z-index: 10;
        transition: transform 0.3s ease, filter 0.3s ease;
        will-change: transform, filter;
      }

      .main-content--pushed {
        z-index: 5;
      }

      .pushed-screen-stack {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 20;
      }

      .pushed-screen-wrapper {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: black;
        transition: transform 0.3s ease;
        pointer-events: none;
        transform: translateX(100%);
      }
      
      .pushed-screen-wrapper--top {
        transform: translateX(0);
        pointer-events: auto;
        box-shadow: -2px 0 20px rgba(0, 0, 0, 0.3);
      }

      .pushed-screen-wrapper--second {
        transform: translateX(-20px);
        opacity: 0.9;
        pointer-events: none;
      }

      .pushed-screen-wrapper--hidden {
        transform: translateX(-100%);
        opacity: 0;
        pointer-events: none;
      }

      .pushed-screen-wrapper--dragging {
        transition: none;
      }

      .swipe-back-shadow {
        position: absolute;
        top: 0;
        left: -10px;
        width: 10px;
        height: 100%;
        background: linear-gradient(to right, rgba(0, 0, 0, 0.2), transparent);
        pointer-events: none;
      }


      /* --- Internal Screen Transitions for DAO/Arbitration --- */
      .screen {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: black;
        transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
        will-change: transform;
      }

      .screen-enter {
        transform: translateX(100%);
      }
      .screen-enter-active {
        transform: translateX(0);
      }
      .screen-exit {
        transform: translateX(0);
      }
      .screen-exit-active {
        transform: translateX(-100%);
      }

      .hyphens-auto {
        -webkit-hyphens: auto;
        -moz-hyphens: auto;
        -ms-hyphens: auto;
        hyphens: auto;
      }

      /* Custom iOS-style Scrollbar */
      .custom-scrollbar::-webkit-scrollbar {
        display: block;
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background-color: rgba(255, 255, 255, 0.2);
        border-radius: 6px;
        border: 2px solid transparent;
        background-clip: content-box;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background-color: rgba(255, 255, 255, 0.4);
      }
      .custom-scrollbar {
        scrollbar-width: thin; /* Firefox */
        scrollbar-color: rgba(255, 255, 255, 0.2) transparent; /* Firefox */
      }

      @keyframes glowing-border-yellow {
        0% { box-shadow: 0 0 3px rgba(250, 204, 21, 0.4); }
        50% { box-shadow: 0 0 12px rgba(250, 204, 21, 0.8); }
        100% { box-shadow: 0 0 3px rgba(250, 204, 21, 0.4); }
      }
      @keyframes glowing-border-cyan {
        0% { box-shadow: 0 0 3px rgba(34, 211, 238, 0.4); }
        50% { box-shadow: 0 0 12px rgba(34, 211, 238, 0.8); }
        100% { box-shadow: 0 0 3px rgba(34, 211, 238, 0.4); }
      }
      .boosted-glow {
        animation: glowing-border-yellow 2.5s ease-in-out infinite;
        border: 1px solid rgba(250, 204, 21, 0.5);
      }
      .wallet-glow {
        animation: glowing-border-cyan 2.5s ease-in-out infinite;
        border: 1px solid rgba(34, 211, 238, 0.5);
      }
      .line-clamp-2 {
         overflow: hidden;
         display: -webkit-box;
         -webkit-box-orient: vertical;
         -webkit-line-clamp: 2;
      }

      /* --- SplashScreen Styles --- */
      .splash-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        opacity: 1;
        transform: scale(1);
      }
      .splash-screen--hidden {
        opacity: 0;
        transform: scale(0.95);
        pointer-events: none;
      }
      .splash-screen__blur {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        background: rgba(0,0,0,0.3);
      }
      .splash-screen__content {
        position: relative;
        z-index: 1;
      }
      .splash-screen__icon {
        width: 128px;
        height: 128px;
        animation: pulse-glow 2.5s ease-in-out infinite;
      }
      @keyframes pulse-glow {
        0%, 100% {
          transform: scale(1);
          opacity: 0.8;
          filter: drop-shadow(0 0 10px rgba(34, 211, 238, 0.4));
        }
        50% {
          transform: scale(1.05);
          opacity: 1;
          filter: drop-shadow(0 0 20px rgba(34, 211, 238, 0.7));
        }
      }
    </style>
  <!--

</script>

</head>
