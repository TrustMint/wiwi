
specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: DeMarketContract
    network: arbitrum-one
    source:
      address: "0x1234567890123456789012345678901234567890"
      abi: DeMarket
      startBlock: 12345678
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - User
        - Listing
        - Purchase
        - Dispute
        - Review
        - Proposal
        - Vote
      abis:
        - name: DeMarket
          file: ./abis/DeMarket.json
      eventHandlers:
        # Marketplace Events
        - event: ListingCreated(indexed uint256,indexed address,string,uint256,address,uint256)
          handler: handleListingCreated
        - event: PurchaseInitiated(indexed uint256,indexed uint256,indexed address,uint256,uint256)
          handler: handlePurchaseInitiated
        - event: PurchaseCompleted(indexed uint256)
          handler: handlePurchaseCompleted
        - event: DisputeOpened(indexed uint256,indexed address,string)
          handler: handleDisputeOpened
        - event: DisputeResolved(indexed uint256,indexed address)
          handler: handleDisputeResolved
        - event: ReviewSubmitted(indexed uint256,indexed address,indexed address,uint8,string)
          handler: handleReviewSubmitted
          
        # DAO Events
        - event: ProposalCreated(indexed uint256,indexed address,string,string,uint256)
          handler: handleProposalCreated
        - event: VoteCast(indexed uint256,indexed address,bool,uint256)
          handler: handleVoteCast
      file: ./src/mapping.ts
