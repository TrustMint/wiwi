"""
Пользователь платформы.
Агрегирует всю активность: сделки, репутацию, голосования.
"""
type User @entity(immutable: false) {
  "Адрес кошелька пользователя (в нижнем регистре)"
  id: ID!

  "Общее количество продаж"
  totalSales: Int!

  "Общее количество покупок"
  totalPurchases: Int!

  "Общий объем продаж в пересчете на USDC (для статистики)"
  totalVolumeUSDC: BigInt!

  "Текущий средний рейтинг (0-100), вычисляется на основе отзывов"
  averageRating: BigDecimal!

  "Количество полученных отзывов"
  reviewCount: Int!

  "Уровень репутации (None, Bronze, Silver, Gold)"
  reputationTier: String!

  "Дата регистрации (первой активности)"
  joinedAt: BigInt!

  "Дата первой сделки (для бейджа 'Ветеран')"
  firstDealTimestamp: BigInt

  # --- Обратные ссылки (Reverse Lookups) ---
  
  "Объявления, созданные пользователем"
  listings: [Listing!]! @derivedFrom(field: "seller")

  "Покупки, совершенные пользователем"
  purchases: [Purchase!]! @derivedFrom(field: "buyer")

  "Отзывы, полученные пользователем (как о продавце)"
  reviewsReceived: [Review!]! @derivedFrom(field: "reviewedUser")

  "Отзывы, оставленные пользователем"
  reviewsWritten: [Review!]! @derivedFrom(field: "reviewer")

  "Голоса в DAO"
  votes: [Vote!]! @derivedFrom(field: "voter")
  
  "Предложения, созданные в DAO"
  proposals: [Proposal!]! @derivedFrom(field: "proposer")
}

"""
Товар или услуга, выставленная на продажу.
"""
type Listing @entity(immutable: false) {
  "ID листинга (строка)"
  id: ID!

  "Продавец товара"
  seller: User!

  "Адрес токена, принимаемого к оплате (USDC/USDT)"
  token: Bytes!

  "Цена за единицу (в wei)"
  price: BigInt!

  "Доступное количество"
  quantity: BigInt!

  "IPFS CID с метаданными (название, описание, фото)"
  ipfsCid: String!

  "Хэш для полнотекстового поиска (название + описание)"
  searchContent: String

  "Текущий статус: Active, Sold, InEscrow, Inactive"
  status: String!

  "Время создания"
  createdAt: BigInt!

  "Время последнего обновления"
  updatedAt: BigInt!

  "История покупок этого товара"
  purchases: [Purchase!]! @derivedFrom(field: "listing")
}

"""
Сделка (Escrow).
Запись о конкретной покупке между двумя пользователями.
"""
type Purchase @entity(immutable: false) {
  "ID сделки (Escrow ID)"
  id: ID!

  "Ссылка на объявление"
  listing: Listing!

  "Покупатель"
  buyer: User!

  "Продавец (дублируем для удобства фильтрации)"
  seller: Bytes! 

  "Заблокированная сумма сделки"
  amount: BigInt!

  "Валюта сделки"
  token: Bytes!

  "Статус: Funded, Completed, Disputed, Resolved, Cancelled"
  status: String!

  "Время начала сделки"
  createdAt: BigInt!

  "Время завершения (успех или отмена)"
  completedAt: BigInt
  
  "Связанный спор (если был открыт)"
  dispute: Dispute @derivedFrom(field: "purchase")
  
  "Отзыв по этой сделке"
  review: Review @derivedFrom(field: "purchase")
}

"""
Спор (Dispute) в Арбитраже.
"""
type Dispute @entity(immutable: false) {
  "ID спора"
  id: ID!

  "Связанная сделка"
  purchase: Purchase!

  "Инициатор спора (адрес)"
  initiator: String!

  "Причина спора (IPFS CID с доказательствами)"
  reasonCid: String!

  "Статус: Recruiting, Voting, Resolved"
  status: String!

  "Победитель спора (адрес)"
  winner: Bytes

  "Время открытия спора"
  createdAt: BigInt!

  "Время решения спора"
  resolvedAt: BigInt
}

"""
Отзыв о сделке.
Отзывы обычно неизменны, поэтому immutable: true.
"""
type Review @entity(immutable: true) {
  "Уникальный ID (хэш транзакции + индекс)"
  id: ID!

  "Сделка, по которой оставлен отзыв"
  purchase: Purchase!

  "Автор отзыва"
  reviewer: User!

  "Получатель отзыва (кого оценивали)"
  reviewedUser: User!

  "Оценка (0-100)"
  rating: Int!

  "Комментарий (IPFS CID)"
  commentCid: String

  "Время создания"
  createdAt: BigInt!
}

"""
Предложение в DAO (Governance Proposal).
Статус предложения меняется, поэтому immutable: false.
"""
type Proposal @entity(immutable: false) {
  "ID предложения"
  id: ID!

  "Автор предложения"
  proposer: User!

  "Описание предложения (или ссылка на IPFS)"
  description: String!

  "Статус: Pending, Active, Canceled, Defeated, Succeeded, Queued, Expired, Executed"
  status: String!

  "Голоса ЗА"
  votesFor: BigInt!

  "Голоса ПРОТИВ"
  votesAgainst: BigInt!

  "Блок начала голосования"
  startBlock: BigInt!

  "Блок окончания голосования"
  endBlock: BigInt!

  "Время создания"
  createdAt: BigInt!

  "История голосов"
  votes: [Vote!]! @derivedFrom(field: "proposal")
}

"""
Голос пользователя в DAO.
Голос обычно окончателен в рамках одной транзакции, ставим immutable: true для оптимизации.
"""
type Vote @entity(immutable: true) {
  "ID голоса (Proposal ID + Voter Address)"
  id: ID!

  "Предложение, за которое голосовали"
  proposal: Proposal!

  "Голосующий"
  voter: User!

  "Выбор: true = За, false = Против"
  support: Boolean!

  "Вес голоса (количество токенов на момент голосования)"
  weight: BigInt!

  "Комментарий к голосу (опционально)"
  reason: String

  "Время голосования"
  timestamp: BigInt!
}